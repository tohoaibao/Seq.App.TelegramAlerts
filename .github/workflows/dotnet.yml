name: .NET CI/CD (Build & Publish)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  PROJECT_FILE_PATH: src/Seq.App.TelegramAlerts.csproj
  BUILD_CONFIGURATION: Release
  
jobs:
  build_and_publish:
    runs-on: windows-latest 

    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 2. Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: 3. Install GitVersion CLI Tool
      run: dotnet tool install --global GitVersion.Tool --version 5.* || dotnet tool update --global GitVersion.Tool --version 5.*

    - name: 4. Determine Version
      id: gitversion
      run: |
        dotnet-gitversion /output buildserver
        echo "PACKAGE_VERSION=$(dotnet-gitversion -output json | jq -r '.NuGetVersionV2')" >> $GITHUB_ENV
      shell: bash

    - name: 5. Restore Dependencies
      run: dotnet restore ${{ env.PROJECT_FILE_PATH }}

    - name: 6. Build Project
      run: dotnet build ${{ env.PROJECT_FILE_PATH }} --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore
      
    - name: 7. Pack NuGet Package
      id: pack
      run: |
        dotnet pack ${{ env.PROJECT_FILE_PATH }} \
          --configuration ${{ env.BUILD_CONFIGURATION }} \
          --no-build \
          /p:Version=${{ env.PACKAGE_VERSION }} \
          --output ${{ github.workspace }}/nuget_packages
          
    - name: 8. Publish to NuGet Gallery
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: dotnet nuget push ${{ github.workspace }}/nuget_packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
