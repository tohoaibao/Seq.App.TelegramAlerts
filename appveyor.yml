# appveyor.yml

version: 2.0.{build}
image: Visual Studio 2022


cache:
  - '%USERPROFILE%\.nuget\packages'

install:
  - choco install gitversion.portable -pre -y

before_build:
  - cmd: gitversion /l console /output buildserver /updateAssemblyInfo
  - ps: Update-AppveyorBuild -Version $GitVersion_NuGetVersion  
  - cmd: dotnet restore src/Seq.App.TelegramAlerts.csproj

build:
  project: src/Seq.App.TelegramAlerts.csproj
  verbosity: minimal

after_build:
  - dotnet pack src/Seq.App.TelegramAlerts.csproj -c Release --no-build -p:PackageVersion=$GitVersion_NuGetVersion  
  - ps: Get-ChildItem **\*.nupkg | % { dotnet nuget push $_.FullName -s "https://api.nuget.org/v3/index.json" -k $env:NUGET_API_KEY }

deploy:
  provider: Environment
  name: NuGet_Deployment_Prod
  on:
    branch: main 
